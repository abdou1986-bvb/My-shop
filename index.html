<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجري الخاص</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; padding: 20px; direction: rtl; }
        h1 { text-align: center; color: #333; }
        #products { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .product:hover { transform: translateY(-5px); }
        .product h3 { color: #007bff; margin-top: 0; }
        .product p { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <h1>قائمة المنتجات</h1>
    <div id="products">جاري التحميل...</div>

    <script>
        fetch('data.json')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('products');
            container.innerHTML = '';
            data.forEach(item => {
                container.innerHTML += `
                    <div class="product">
                        <h3>${item.name}</h3>
                        <p>السعر: ${item.price} دج</p>
                        <p>المخزون: ${item.stock}</p>
                        <p>${item.description}</p>
                    </div>
                `;
            });
        })
        .catch(err => {
            document.getElementById('products').innerHTML = 'حدث خطأ أثناء تحميل البيانات.';
            console.error(err);
        });
    </script>
</body>
</html>
